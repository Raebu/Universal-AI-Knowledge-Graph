services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ukg
      POSTGRES_PASSWORD: ukg
      POSTGRES_DB: ukg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ukg -d ukg"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
